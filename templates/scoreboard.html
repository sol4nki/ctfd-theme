{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="text-center mb-5">
        <h1 class="h1">
            SCOREBOARD
        </h1>
    </div>

    {% include "components/errors.html" %}

    <div
        id="score-graph"
        class="status-panel mb-4"
        x-data="ScoreboardDetail"
        x-ref="scoregraph"
        @bracket-change.window="activeBracket=$event.detail; update();"
        style="min-height: 320px;"
    >

        <div class="p-5 text-center" x-show="!show">
            <i class="fas fa-circle-notch fa-spin fa-3x fa-fw spinner"></i>
        </div>

    </div>

    <div
        id="scoreboard"
        x-data="ScoreboardList"
    >

        <template x-if="brackets.length && standings.length">

            <div class="status-panel mb-4">

                <div class="status-head">
                    <span>Brackets</span>
                </div>

                <div class="p-3 text-center">

                    <button
                        class="btn ghost mx-1 mb-2"
                        :class="{ 'active-filter': !activeBracket }"
                        @click="activeBracket=null"
                    >
                        ALL
                    </button>

                    <template x-for="bracket in brackets">

                        <button
                            class="btn ghost mx-1 mb-2"
                            :class="{ 'active-filter': activeBracket == bracket.id }"
                            x-text="bracket.name"
                            @click="activeBracket=bracket.id"
                        ></button>

                    </template>

                </div>

            </div>

        </template>


        <div
            class="status-panel"
            x-show="standings.length"
        >

            <div class="status-head">
                <span>Standings</span>
                <span x-text="standings.length + ' ENTRIES'"></span>
            </div>

            <div class="table-responsive">

                <table class="table users-table table-hover mb-0">

                    <thead>
                        <tr>
                            <th style="width:10%">
                                PLACE
                            </th>

                            <th style="width:70%">
                                {{ get_mode_as_word(capitalize=True) }}
                            </th>

                            <th style="width:20%">
                                SCORE
                            </th>
                        </tr>
                    </thead>

                    <tbody>

                        <template
                            x-for="(standing,index) in standings.filter(
                                i => activeBracket
                                    ? i.bracket_id == activeBracket
                                    : true
                            )"
                        >

                            <tr>

                                <td>
                                    <strong x-text="index + 1"></strong>
                                </td>

                                <td>

                                    <a
                                        :href="standing.account_url"
                                        x-text="standing.name"
                                        class="user-link"
                                    ></a>

                                    <template x-if="standing.bracket_name">

                                        <span
                                            class="badge bg-secondary ms-2"
                                            x-text="standing.bracket_name"
                                        ></span>

                                    </template>

                                </td>

                                <td
                                    x-text="standing.score"
                                ></td>

                            </tr>

                        </template>

                    </tbody>

                </table>

            </div>

        </div>

        <div
            class="status-panel"
            x-show="!standings.length"
        >

            <div class="p-5 text-center text-muted">
                SCOREBOARD IS EMPTY
            </div>

        </div>

    </div>

</div>

{% endblock %}

{% block scripts %}
{{ Assets.js("assets/js/scoreboard.js") }}
{% endblock %}
